<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGEND OF PYROFORMER - Epic 3D Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            overflow: hidden;
            color: #fff;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* UI */
        .hud {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .hud-section {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 215, 0, 0.3);
            pointer-events: auto;
        }

        .hud-text {
            margin: 5px 0;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .health-bar {
            width: 200px;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #ff4444;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff8888);
            width: 100%;
            transition: width 0.3s;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .menu-overlay.hidden {
            display: none;
        }

        .menu-overlay.visible {
            pointer-events: auto;
        }

        .menu-content {
            background: linear-gradient(135deg, #1a1a3e 0%, #2d1b4e 100%);
            padding: 40px;
            border-radius: 15px;
            max-width: 600px;
            border: 3px solid #ffd700;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
        }

        .menu-content h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ffd700;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.8);
            letter-spacing: 2px;
        }

        .menu-content h2 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #ffd700;
        }

        .menu-button {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: white;
            border: 2px solid #ff4444;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .menu-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 215, 0, 0.4);
            background: linear-gradient(135deg, #ff4444, #ff6b35);
        }

        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .achievement-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid rgba(255, 215, 0, 0.3);
            font-size: 12px;
        }

        .achievement-item.unlocked {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-color: #ffed4e;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            color: #ffd700;
            font-weight: bold;
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }

        .dialogue-box {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border-radius: 8px;
            max-width: 600px;
            border: 2px solid #ffd700;
            z-index: 500;
            max-height: 150px;
            overflow-y: auto;
            pointer-events: auto;
        }

        .dialogue-box.hidden {
            display: none;
        }

        .npc-name {
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .dialogue-text {
            font-size: 14px;
            line-height: 1.5;
            color: #ddd;
        }

        .hotbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
            pointer-events: auto;
        }

        .hotbar-slot {
            width: 60px;
            height: 60px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .hotbar-slot:hover, .hotbar-slot.active {
            background: rgba(255, 215, 0, 0.3);
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .minimap {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            z-index: 100;
        }

        #minimapCanvas {
            width: 100%;
            height: 100%;
            border-radius: 6px;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a3e 0%, #2d1b4e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .loading-text {
            color: #ffd700;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .loading-bar {
            width: 300px;
            height: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #ffd700;
            border-radius: 5px;
            overflow: hidden;
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, #ff6b35, #ffd700);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-text">🌟 LEGEND OF PYROFORMER 🌟</div>
        <div class="loading-bar">
            <div id="loadingProgress" class="loading-progress"></div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <!-- HUD -->
    <div class="hud">
        <div class="hud-section">
            <div class="hud-text">❤️ Health</div>
            <div class="health-bar">
                <div id="healthFill" class="health-fill"></div>
            </div>
            <div class="hud-text" id="hudLevel">📍 Level: Forest</div>
            <div class="hud-text" id="hudCoins">💰 Gold: 0</div>
        </div>
        <div class="hud-section">
            <div class="hud-text" id="hudStats">⚔️ Combat Ready</div>
            <div class="hud-text" id="hudTime">⏰ Time: 0:00</div>
            <div class="hud-text" id="hudBiome">🗺️ Forest Biome</div>
        </div>
    </div>

    <!-- Minimap -->
    <div class="minimap">
        <canvas id="minimapCanvas"></canvas>
    </div>

    <!-- Hotbar -->
    <div class="hotbar" id="hotbar"></div>

    <!-- Dialogue Box -->
    <div id="dialogueBox" class="dialogue-box hidden">
        <div class="npc-name" id="npcName">NPC</div>
        <div class="dialogue-text" id="dialogueText">Hello, adventurer!</div>
    </div>

    <!-- Main Menu -->
    <div id="mainMenu" class="menu-overlay visible">
        <div class="menu-content">
            <h1>⚔️ LEGEND OF PYROFORMER ⚔️</h1>
            <p style="margin-bottom: 30px; font-size: 16px; color: #ffd700;">An Epic 3D Adventure</p>
            <button class="menu-button" onclick="game.startGame()">▶ NEW GAME</button>
            <button class="menu-button" onclick="game.showAchievements()">🏆 ACHIEVEMENTS</button>
            <button class="menu-button" onclick="game.showStats()">📊 STATS</button>
            <button class="menu-button" onclick="game.showSettings()">⚙️ SETTINGS</button>
        </div>
    </div>

    <!-- Achievements Menu -->
    <div id="achievementsMenu" class="menu-overlay hidden">
        <div class="menu-content">
            <h2>🏆 ACHIEVEMENTS</h2>
            <div id="achievementsList" class="achievement-grid"></div>
            <button class="menu-button" onclick="game.backToMenu()">← BACK</button>
        </div>
    </div>

    <!-- Stats Menu -->
    <div id="statsMenu" class="menu-overlay hidden">
        <div class="menu-content">
            <h2>📊 STATISTICS</h2>
            <div class="stats-grid" id="statsGrid"></div>
            <button class="menu-button" onclick="game.backToMenu()">← BACK</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"></script>
    <script>
        // ==================== GAME ENGINE ====================
        class Game {
            constructor() {
                this.canvas = document.getElementById('canvas');
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
                this.renderer = new THREE.WebGLRenderer({ canvas: this.canvas, antialias: true, alpha: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFShadowShadowMap;
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.2;

                this.world = new CANNON.World();
                this.world.gravity.set(0, -30, 0);
                this.world.defaultContactMaterial.friction = 0.3;

                this.gameState = 'menu';
                this.isPlaying = false;
                this.isPaused = false;
                this.player = null;
                this.npcs = [];
                this.enemies = [];
                this.gameTime = 0;
                this.playerData = {
                    health: 100,
                    maxHealth: 100,
                    gold: 0,
                    level: 1,
                    experience: 0,
                    deaths: 0,
                    achievements: new Set(),
                };

                this.setupScene();
                this.setupLights();
                this.setupEventListeners();
                this.setupAchievements();
                this.hideLoadingScreen();

                window.addEventListener('resize', () => this.onWindowResize());
                this.animate();
            }

            setupScene() {
                this.scene.fog = new THREE.Fog(0x1a1a3e, 200, 1000);
                this.scene.background = new THREE.Color(0x1a1a3e);
            }

            setupLights() {
                // Main directional light
                const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
                dirLight.position.set(150, 200, 150);
                dirLight.castShadow = true;
                dirLight.shadow.mapSize.width = 2048;
                dirLight.shadow.mapSize.height = 2048;
                dirLight.shadow.camera.far = 600;
                dirLight.shadow.camera.left = -300;
                dirLight.shadow.camera.right = 300;
                dirLight.shadow.camera.top = 300;
                dirLight.shadow.camera.bottom = -300;
                this.scene.add(dirLight);

                const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
                this.scene.add(ambientLight);

                const rimLight = new THREE.DirectionalLight(0x88ccff, 0.6);
                rimLight.position.set(-150, 150, -150);
                this.scene.add(rimLight);
            }

            setupEventListeners() {
                window.addEventListener('keydown', (e) => this.onKeyDown(e));
                window.addEventListener('keyup', (e) => this.onKeyUp(e));
                window.addEventListener('click', (e) => this.onClick(e));
            }

            setupAchievements() {
                this.achievements = [
                    { id: 0, name: 'First Steps', desc: 'Begin your adventure', unlocked: false },
                    { id: 1, name: 'Dragon Slayer', desc: 'Defeat a boss', unlocked: false },
                    { id: 2, name: 'Gold Rush', desc: 'Collect 500 gold', unlocked: false },
                    { id: 3, name: 'Explorer', desc: 'Visit all biomes', unlocked: false },
                    { id: 4, name: 'Collector', desc: 'Find treasures', unlocked: false },
                    { id: 5, name: 'Warrior', desc: 'Reach level 10', unlocked: false },
                    { id: 6, name: 'Legendary', desc: 'Reach level 50', unlocked: false },
                    { id: 7, name: 'Diplomat', desc: 'Talk to NPCs', unlocked: false },
                    { id: 8, name: 'Survivor', desc: 'Complete story', unlocked: false },
                    { id: 9, name: 'Master', desc: 'Complete all tasks', unlocked: false },
                ];
            }

            onKeyDown(e) {
                if (!this.player) return;
                const key = e.key.toLowerCase();
                if (key === 'w' || key === 'arrowup') this.player.moveForward = true;
                if (key === 's' || key === 'arrowdown') this.player.moveBackward = true;
                if (key === 'a' || key === 'arrowleft') this.player.moveLeft = true;
                if (key === 'd' || key === 'arrowright') this.player.moveRight = true;
                if (key === ' ') this.player.jump();
                if (key === 'e') this.interactNearby();
                if (key === 'escape') this.togglePause();
                if (key === '1') this.player.equipWeapon(0);
                if (key === '2') this.player.equipWeapon(1);
                if (key === '3') this.player.equipWeapon(2);
            }

            onKeyUp(e) {
                if (!this.player) return;
                const key = e.key.toLowerCase();
                if (key === 'w' || key === 'arrowup') this.player.moveForward = false;
                if (key === 's' || key === 'arrowdown') this.player.moveBackward = false;
                if (key === 'a' || key === 'arrowleft') this.player.moveLeft = false;
                if (key === 'd' || key === 'arrowright') this.player.moveRight = false;
            }

            onClick(e) {
                if (!this.player || !this.isPlaying) return;
                if (e.button === 0) this.player.attack();
            }

            startGame() {
                this.hideMenu('mainMenu');
                this.gameState = 'playing';
                this.isPlaying = true;
                this.scene.clear();
                this.createWorld();
                this.createPlayer();
                this.createNPCs();
                this.createEnemies();
                this.playerData.achievements.add(0);
                this.updateHUD();
            }

            createWorld() {
                // Terrain
                const terrainGeometry = new THREE.PlaneGeometry(600, 600, 60, 60);
                terrainGeometry.rotateX(-Math.PI / 2);

                const positionAttribute = terrainGeometry.getAttribute('position');
                const positionArray = positionAttribute.array;

                for (let i = 0; i < positionArray.length; i += 3) {
                    const x = positionArray[i];
                    const z = positionArray[i + 2];
                    positionArray[i + 1] = Math.sin(x * 0.01) * 15 + Math.cos(z * 0.01) * 15;
                }
                positionAttribute.needsUpdate = true;
                terrainGeometry.computeVertexNormals();

                const terrainMaterial = new THREE.MeshStandardMaterial({
                    color: 0x2d5016,
                    roughness: 0.8,
                    metalness: 0,
                    flatShading: true
                });

                const terrain = new THREE.Mesh(terrainGeometry, terrainMaterial);
                terrain.castShadow = true;
                terrain.receiveShadow = true;
                this.scene.add(terrain);

                // Add trees
                for (let i = 0; i < 40; i++) {
                    const x = (Math.random() - 0.5) * 500;
                    const z = (Math.random() - 0.5) * 500;
                    this.createTree(x, 0, z);
                }

                // Add structures
                this.createCastle(0, 0, 0);
                this.createTower(200, 0, 200);
                this.createTower(-200, 0, -200);
                this.createRuins(0, 0, -200);
            }

            createTree(x, y, z) {
                const trunkGeometry = new THREE.CylinderGeometry(6, 10, 40, 8);
                const trunkMaterial = new THREE.MeshStandardMaterial({ color: 0x5c3d2e, roughness: 0.9 });
                const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
                trunk.position.set(x, y + 20, z);
                trunk.castShadow = true;
                trunk.receiveShadow = true;
                this.scene.add(trunk);

                // Foliage
                for (let i = 0; i < 3; i++) {
                    const foliageGeometry = new THREE.IcosahedronGeometry(25 - i * 6, 4);
                    const foliageMaterial = new THREE.MeshStandardMaterial({
                        color: [0x1b5e20, 0x2e7d32, 0x43a047][i],
                        roughness: 0.6,
                        flatShading: true
                    });
                    const foliage = new THREE.Mesh(foliageGeometry, foliageMaterial);
                    foliage.position.set(x, y + 50 - i * 6, z);
                    foliage.castShadow = true;
                    foliage.receiveShadow = true;
                    this.scene.add(foliage);
                }
            }

            createCastle(x, y, z) {
                const keepGeometry = new THREE.BoxGeometry(70, 100, 70);
                const stoneMaterial = new THREE.MeshStandardMaterial({
                    color: 0x696969,
                    roughness: 0.9,
                    flatShading: true
                });
                const keep = new THREE.Mesh(keepGeometry, stoneMaterial);
                keep.position.set(x, y + 50, z);
                keep.castShadow = true;
                keep.receiveShadow = true;
                this.scene.add(keep);

                // Corner towers
                const corners = [[-35, 0, -35], [35, 0, -35], [-35, 0, 35], [35, 0, 35]];
                for (const corner of corners) {
                    const towerGeometry = new THREE.CylinderGeometry(14, 18, 120, 8);
                    const tower = new THREE.Mesh(towerGeometry, stoneMaterial);
                    tower.position.set(x + corner[0], y + 60, z + corner[2]);
                    tower.castShadow = true;
                    tower.receiveShadow = true;
                    this.scene.add(tower);
                }

                // Gate
                const gateGeometry = new THREE.BoxGeometry(50, 60, 6);
                const gateMaterial = new THREE.MeshStandardMaterial({ color: 0x3d3d3d });
                const gate = new THREE.Mesh(gateGeometry, gateMaterial);
                gate.position.set(x, y + 30, z - 35);
                gate.castShadow = true;
                this.scene.add(gate);
            }

            createTower(x, y, z) {
                const towerGeometry = new THREE.CylinderGeometry(18, 25, 100, 8);
                const stoneMaterial = new THREE.MeshStandardMaterial({ color: 0x696969, roughness: 0.9, flatShaping: true });
                const tower = new THREE.Mesh(towerGeometry, stoneMaterial);
                tower.position.set(x, y + 50, z);
                tower.castShadow = true;
                tower.receiveShadow = true;
                this.scene.add(tower);

                const roofGeometry = new THREE.ConeGeometry(22, 35, 8);
                const roofMaterial = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
                const roof = new THREE.Mesh(roofGeometry, roofMaterial);
                roof.position.set(x, y + 125, z);
                roof.castShadow = true;
                this.scene.add(roof);
            }

            createRuins(x, y, z) {
                for (let i = 0; i < 6; i++) {
                    const ruinGeometry = new THREE.BoxGeometry(20, 40, 20);
                    const ruinMaterial = new THREE.MeshStandardMaterial({ color: 0x8B7355 });
                    const ruin = new THREE.Mesh(ruinGeometry, ruinMaterial);
                    ruin.position.set(x + i * 35, y + 20, z);
                    ruin.castShadow = true;
                    ruin.receiveShadow = true;
                    this.scene.add(ruin);
                }
            }

            createPlayer() {
                this.player = new Player(this.scene, this.world, 0, 50, 0);
                this.camera.position.set(0, 30, 50);
                this.updateCamera();
            }

            createNPCs() {
                const npcData = [
                    { name: 'Elder Sage', x: 0, z: -100, dialogue: 'Welcome, brave adventurer! The land needs your help.' },
                    { name: 'Blacksmith', x: 80, z: -80, dialogue: 'I can forge powerful weapons for you. Bring materials!' },
                    { name: 'Merchant', x: -80, z: -80, dialogue: 'I have rare items to sell. Do you have gold?' }
                ];

                for (const data of npcData) {
                    const npc = new NPC(this.scene, data.name, data.x, 5, data.z, data.dialogue);
                    this.npcs.push(npc);
                }
            }

            createEnemies() {
                for (let i = 0; i < 6; i++) {
                    const x = (Math.random() - 0.5) * 400;
                    const z = (Math.random() - 0.5) * 400;
                    if (Math.abs(x) < 120 && Math.abs(z) < 120) continue;
                    const enemy = new Enemy(this.scene, x, 5, z, 'goblin');
                    this.enemies.push(enemy);
                }
            }

            interactNearby() {
                if (!this.player) return;
                for (const npc of this.npcs) {
                    const dist = this.player.mesh.position.distanceTo(npc.mesh.position);
                    if (dist < 40) {
                        this.showDialogue(npc.name, npc.dialogue);
                        this.playerData.achievements.add(7);
                        return;
                    }
                }
            }

            showDialogue(name, text) {
                document.getElementById('npcName').textContent = name;
                document.getElementById('dialogueText').textContent = text;
                document.getElementById('dialogueBox').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('dialogueBox').classList.add('hidden');
                }, 5000);
            }

            updateCamera() {
                if (!this.player) return;
                const offset = new THREE.Vector3(0, 35, 60);
                this.camera.position.lerp(this.player.mesh.position.clone().add(offset), 0.08);
                this.camera.lookAt(this.player.mesh.position.clone().add(new THREE.Vector3(0, 15, 0)));
            }

            updateHUD() {
                const healthPercent = (this.playerData.health / this.playerData.maxHealth) * 100;
                document.getElementById('healthFill').style.width = healthPercent + '%';
                document.getElementById('hudCoins').textContent = `💰 Gold: ${this.playerData.gold}`;
                document.getElementById('hudLevel').textContent = `📍 Level: ${this.playerData.level}`;
                const playtime = Math.floor(this.gameTime / 60);
                document.getElementById('hudTime').textContent = `⏰ Time: ${playtime}:${String(Math.floor(this.gameTime % 60)).padStart(2, '0')}`;
            }

            showAchievements() {
                const list = document.getElementById('achievementsList');
                list.innerHTML = '';
                for (const ach of this.achievements) {
                    const item = document.createElement('div');
                    item.className = 'achievement-item' + (this.playerData.achievements.has(ach.id) ? ' unlocked' : '');
                    item.innerHTML = `
                        <div>${this.playerData.achievements.has(ach.id) ? '🏆' : '🔒'}</div>
                        <div style="font-size: 10px;">${ach.name}</div>
                    `;
                    list.appendChild(item);
                }
                this.showMenu('achievementsMenu');
            }

            showStats() {
                const grid = document.getElementById('statsGrid');
                grid.innerHTML = `
                    <div class="stat-box">
                        <div class="stat-value">${this.playerData.level}</div>
                        <div class="stat-label">LEVEL</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value">${Math.floor(this.playerData.experience)}</div>
                        <div class="stat-label">EXP</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value">${this.playerData.gold}</div>
                        <div class="stat-label">GOLD</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value">${this.playerData.deaths}</div>
                        <div class="stat-label">DEATHS</div>
                    </div>
                `;
                this.showMenu('statsMenu');
            }

            showSettings() {
                alert('Settings: Volume, Graphics, Controls (coming soon)');
            }

            showMenu(menuId) {
                document.getElementById(menuId).classList.remove('hidden');
                document.getElementById(menuId).classList.add('visible');
            }

            hideMenu(menuId) {
                document.getElementById(menuId).classList.add('hidden');
                document.getElementById(menuId).classList.remove('visible');
            }

            backToMenu() {
                this.hideMenu('achievementsMenu');
                this.hideMenu('statsMenu');
                this.showMenu('mainMenu');
                this.isPlaying = false;
                this.gameState = 'menu';
            }

            togglePause() {
                this.isPaused = !this.isPaused;
            }

            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            hideLoadingScreen() {
                setTimeout(() => {
                    document.getElementById('loadingScreen').style.opacity = '0';
                    document.getElementById('loadingScreen').style.pointerEvents = 'none';
                    setTimeout(() => {
                        document.getElementById('loadingScreen').style.display = 'none';
                    }, 500);
                }, 800);
            }

            animate() {
                requestAnimationFrame(() => this.animate());

                if (this.isPlaying && !this.isPaused) {
                    this.gameTime += 0.016;
                    this.world.step(1 / 60);

                    if (this.player) {
                        this.player.update();
                        this.updateCamera();

                        // Check enemy collisions
                        for (const enemy of this.enemies) {
                            enemy.update(this.player);
                            const dist = this.player.mesh.position.distanceTo(enemy.mesh.position);
                            if (dist < 20) {
                                this.playerData.health -= 0.5;
                            }
                        }

                        if (this.playerData.health <= 0) {
                            this.playerData.deaths++;
                            this.playerData.health = 100;
                            this.player.mesh.position.set(0, 50, 0);
                        }
                    }

                    this.updateHUD();
                }

                this.renderer.render(this.scene, this.camera);
            }
        }

        // ==================== PLAYER CLASS ====================
        class Player {
            constructor(scene, world, x, y, z) {
                this.scene = scene;
                this.world = world;
                this.health = 100;
                this.speed = 1;
                this.moveForward = false;
                this.moveBackward = false;
                this.moveLeft = false;
                this.moveRight = false;
                this.isGrounded = false;
                this.currentWeapon = 0;

                const geometry = new THREE.CapsuleGeometry(5, 20, 4, 8);
                const material = new THREE.MeshStandardMaterial({
                    color: 0xff6b6b,
                    roughness: 0.6,
                    metalness: 0.2,
                    flatShading: true
                });
                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.position.set(x, y, z);
                this.mesh.castShadow = true;
                this.mesh.receiveShadow = true;
                scene.add(this.mesh);

                const shape = new CANNON.Sphere(5);
                this.body = new CANNON.Body({ mass: 1 });
                this.body.addShape(shape);
                this.body.position.set(x, y, z);
                world.addBody(this.body);

                this.addWeapon('sword');
            }

            addWeapon(type) {
                if (type === 'sword') {
                    const swordGeometry = new THREE.BoxGeometry(3, 30, 1);
                    const swordMaterial = new THREE.MeshStandardMaterial({ color: 0xffaa00, metalness: 0.9 });
                    const sword = new THREE.Mesh(swordGeometry, swordMaterial);
                    sword.position.set(8, 0, 0);
                    sword.castShadow = true;
                    this.mesh.add(sword);
                }
            }

            update() {
                const direction = new THREE.Vector3();
                if (this.moveForward) direction.z -= 1;
                if (this.moveBackward) direction.z += 1;
                if (this.moveLeft) direction.x -= 1;
                if (this.moveRight) direction.x += 1;

                if (direction.length() > 0) {
                    direction.normalize().multiplyScalar(this.speed);
                    this.body.velocity.x = direction.x * 15;
                    this.body.velocity.z = direction.z * 15;

                    this.mesh.lookAt(
                        this.mesh.position.clone().add(direction)
                    );
                }

                this.mesh.position.copy(this.body.position);
                this.mesh.quaternion.copy(this.body.quaternion);
            }

            jump() {
                if (this.isGrounded) {
                    this.body.velocity.y = 20;
                    this.isGrounded = false;
                }
            }

            attack() {
                console.log('Attack with weapon');
            }

            equipWeapon(index) {
                this.currentWeapon = index;
            }
        }

        // ==================== NPC CLASS ====================
        class NPC {
            constructor(scene, name, x, y, z, dialogue) {
                this.name = name;
                this.dialogue = dialogue;

                const geometry = new THREE.CapsuleGeometry(4, 16, 4, 8);
                const material = new THREE.MeshStandardMaterial({
                    color: 0x4ecdc4,
                    roughness: 0.6,
                    flatShading: true
                });
                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.position.set(x, y, z);
                this.mesh.castShadow = true;
                this.mesh.receiveShadow = true;
                scene.add(this.mesh);

                const headGeometry = new THREE.SphereGeometry(5, 8, 8);
                const head = new THREE.Mesh(headGeometry, material);
                head.position.y = 14;
                head.castShadow = true;
                this.mesh.add(head);
            }
        }

        // ==================== ENEMY CLASS ====================
        class Enemy {
            constructor(scene, x, y, z, type) {
                this.type = type;
                this.health = 30;
                this.speed = 0.6;
                this.detectionRange = 150;

                const geometry = new THREE.CapsuleGeometry(4, 16, 4, 8);
                const material = new THREE.MeshStandardMaterial({
                    color: 0xff4444,
                    roughness: 0.6,
                    flatShading: true
                });
                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.position.set(x, y, z);
                this.mesh.castShadow = true;
                this.mesh.receiveShadow = true;
                scene.add(this.mesh);
            }

            update(player) {
                if (!player) return;

                const distance = this.mesh.position.distanceTo(player.mesh.position);

                if (distance < this.detectionRange) {
                    const direction = player.mesh.position.clone().sub(this.mesh.position).normalize();
                    this.mesh.position.addScaledVector(direction, this.speed);
                    this.mesh.lookAt(player.mesh.position);
                }
            }
        }

        // ==================== INITIALIZE GAME ====================
        const game = new Game();
    </script>
</body>
</html>
